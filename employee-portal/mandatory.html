<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandatory Compliance // EmployeeHub</title>
  <!-- Google Fonts: Outfit for heading/UI, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Style Link -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- App Container -->
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#brand-grad)" />
            <path d="M2 17L12 22L22 17" stroke="url(#brand-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="url(#brand-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="brand-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#8b5cf6" />
                <stop offset="1" stop-color="#ec4899" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">EmployeeHub</span>
      </div>

      <!-- Navigation Links -->
      <nav class="sidebar-nav">
        <a href="home.html" class="nav-item" id="nav-dashboard">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="mandatory.html" class="nav-item active" id="nav-mandatory">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Mandatory Courses</span>
        </a>
        <a href="skills.html" class="nav-item" id="nav-skills">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          <span>Project & Skills</span>
        </a>
      </nav>

      <!-- User Profile Card & Switcher in Sidebar Footer -->
      <div class="sidebar-footer">
        <div class="current-user-card">
          <div class="user-avatar" id="sidebar-avatar">N/A</div>
          <div class="user-info">
            <h4 class="user-name" id="sidebar-username">N/A</h4>
            <p class="user-role" id="sidebar-role">N/A</p>
          </div>
        </div>
        <div class="switcher-wrapper">
          <label for="user-profile-select">Demographic Mode:</label>
          <div class="custom-select-wrapper">
            <select id="user-profile-select" class="profile-select">
              <!-- Options populated dynamically from users.json -->
            </select>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Bar / Header -->
      <header class="top-header">
        <div class="header-welcome">
          <h1 id="welcome-title">Welcome back!</h1>
          <p class="current-date" id="current-date">N/A</p>
        </div>
        <div class="header-actions">
          <div class="notifications-bell">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="bell-badge"></span>
          </div>
          <div class="header-profile">
            <div class="user-avatar-small" id="header-avatar">N/A</div>
          </div>
        </div>
      </header>

      <!-- Scrollable Tab Container -->
      <div class="content-body">
        
        <!-- Tab 2: Mandatory Courses View -->
        <section id="tab-mandatory" class="tab-pane active">
          <div class="section-header-large">
            <h2>Mandatory Compliance Courses</h2>
            <p>Required training by HR regarding ethics, workplace safety, cybersecurity, and data compliance.</p>
          </div>
          <div class="courses-grid" id="mandatory-courses-grid" style="margin-top: 1.5rem;">
            <!-- Dynamically populated cards -->
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- JavaScript file -->
  <script src="app.js?v=3"></script>
</body>
</html>
